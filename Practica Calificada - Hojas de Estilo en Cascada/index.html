<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto: Arquitectura de Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <img src="BGM.jpg" alt="Logo de TechProducto" class="logo-img">
        </div>
        <nav class="menu">
            <a href="#">Inicio</a>
            <a href="#">Producto</a>
            <a href="#">Contacto</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>El Futuro de la Tecnología</h1>
            <div class="hero-image-container">
                <img src="producto tecnologino.jpg" alt="Producto Tecnológico" class="responsive-img">
            </div>
        </section>

        <section class="benefits-container">
            <div class="benefit-card">Beneficio 1</div>
            <div class="benefit-card">Beneficio 2</div>
            <div class="benefit-card">Beneficio 3</div>
            <div class="benefit-card">Beneficio 4</div>
            <div class="benefit-card">Beneficio 5</div>
            <div class="benefit-card">Beneficio 6</div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-col">Info 1</div>
        <div class="footer-col">Info 2</div>
        <div class="footer-col">Info 3</div>
        <div class="footer-copy">© 2026 Todos los Derechos Reservados</div>
    </footer>
